<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash IPTV Pre-Registration</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: #00ffd5;
    font-size: 28px;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    margin-top: 20px;
    backdrop-filter: blur(10px);
}

.features {
    display: flex;
    flex-direction: column;
    align-items: center;
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

.features li {
    margin: 8px 0;
    font-size: 18px;
}

.price {
    font-size: 22px;
    margin-top: 20px;
    color: #ffcc00;
}

.btn {
    background: #ffcc00;
    color: black;
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

.btn:hover {
    background: #ffaa00;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

    <h1>🔥 Ab TV ka Zamana Badal Gaya Hai!</h1>

    <div class="box">

        <h2>Flashcable IPTV – 4-in-1 Smart Service</h2>

        <ul class="features">
            <li>📺 Live TV</li>
            <li>🌐 High Speed Internet</li>
            <li>🎬 OTT Apps</li>
            <li>☎ Voice Calling</li>
            <li>✔ No Dish Problem</li>
            <li>✔ Crystal Clear HD Channels</li>
            <li>✔ Superfast Fiber Internet</li>
        </ul>

        <div class="price">💰 Plans start @ ₹399 only!</div>

        <button class="btn" onclick="openForm()">
            👉 Pre-Register Now – It’s FREE
        </button>

    </div>

</div>

<script>
function openForm() {
    window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfmoUE9bjN5twtXh-2uMX9eageJxUyJYYgK7ubUdFx3swmgPQ/viewform?usp=publish-editor";
}
</script>

</body>
</html>
